name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # 如果你的預設分支是 master，請將這裡改為 master
  workflow_dispatch: # 允許手動觸發部署

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Inject API URL
        run: |
          sed -i "s|__API_URL_PLACEHOLDER__|${{ secrets.API_URL }}|g" script.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 上傳整個儲存庫根目錄
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
