<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  body { padding: 0; }
  /* Ensure embed fills width */
  iframe { max-width: 100% !important; touch-action: pan-y; }
  blockquote { margin: 0 !important; }
  /* iOS: allow inline video playback */
  video {
    -webkit-playsinline: true;
    playsinline: true;
  }
</style>
</head>
<body>
<div id="embed-root"></div>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const postUrl = params.get('url');
  const type = params.get('type'); // 'threads' or 'instagram'
  const root = document.getElementById('embed-root');

  if (!postUrl || !type) {
    root.textContent = 'Missing parameters';
    return;
  }

  let lastHeight = 0;

  function reportHeight() {
    // Check body, root, and any nested iframes created by embed.js
    let h = Math.max(
      document.body.scrollHeight,
      document.body.offsetHeight,
      root.scrollHeight,
      root.offsetHeight
    );

    // embed.js creates iframes inside root — check their height too
    const nestedIframes = root.querySelectorAll('iframe');
    nestedIframes.forEach(f => {
      const rect = f.getBoundingClientRect();
      const bottom = rect.top + rect.height + window.scrollY;
      if (bottom > h) h = Math.ceil(bottom);
    });

    if (h > 0 && h !== lastHeight) {
      lastHeight = h;
      window.parent.postMessage({
        type: 'embed-resize',
        height: h,
        url: postUrl
      }, '*');
    }
  }

  // Poll for height changes (covers all cases including slow embed rendering)
  setInterval(reportHeight, 300);

  // Also use ResizeObserver for instant detection
  if (window.ResizeObserver) {
    const ro = new ResizeObserver(reportHeight);
    ro.observe(document.body);
    ro.observe(root);
  }

  // Also use MutationObserver to catch embed.js creating new elements
  const mo = new MutationObserver(reportHeight);
  mo.observe(root, { childList: true, subtree: true, attributes: true });

  // Report on load + delayed checks for slow embeds
  window.addEventListener('load', () => {
    setTimeout(reportHeight, 500);
    setTimeout(reportHeight, 1500);
    setTimeout(reportHeight, 3000);
    setTimeout(reportHeight, 5000);
    setTimeout(reportHeight, 8000);
  });

  if (type === 'threads') {
    // Threads: use direct /embed/ iframe (avoids triple-nesting that breaks iOS)
    let embedUrl = postUrl;
    embedUrl = embedUrl.replace('www.threads.com', 'www.threads.net')
                       .replace('threads.com', 'threads.net');
    if (!embedUrl.endsWith('/')) embedUrl += '/';
    embedUrl += 'embed/';

    const iframe = document.createElement('iframe');
    iframe.src = embedUrl;
    iframe.style.cssText = 'border:none; width:100%; min-height:400px; border-radius:12px; display:block;';
    iframe.setAttribute('frameborder', '0');
    iframe.setAttribute('scrolling', 'no');
    iframe.setAttribute('allowtransparency', 'true');
    iframe.setAttribute('allowfullscreen', '');
    iframe.setAttribute('allow', 'autoplay; fullscreen; encrypted-media; picture-in-picture');
    root.appendChild(iframe);

    // Measure the iframe once loaded — use its scrollHeight or a fallback
    iframe.addEventListener('load', () => {
      // Try to detect height from the nested iframe (cross-origin, may fail)
      const tryHeight = () => {
        try {
          const h = iframe.contentDocument.body.scrollHeight;
          if (h > 100) {
            iframe.style.height = h + 'px';
            reportHeight();
            return;
          }
        } catch (e) {
          // Cross-origin — can't read height, use a generous default
        }
        // Fallback: set based on visible content type
        iframe.style.height = '700px';
        reportHeight();
      };
      setTimeout(tryHeight, 1000);
      setTimeout(tryHeight, 3000);
      setTimeout(tryHeight, 5000);
    });

  } else if (type === 'instagram') {
    // Create Instagram blockquote
    const bq = document.createElement('blockquote');
    bq.className = 'instagram-media';
    bq.setAttribute('data-instgrm-permalink', postUrl);
    bq.setAttribute('data-instgrm-version', '14');
    bq.setAttribute('data-instgrm-captioned', '');
    bq.style.cssText = 'background:#FFF; border:0; border-radius:3px; box-shadow:0 0 1px 0 rgba(0,0,0,0.5),0 1px 10px 0 rgba(0,0,0,0.15); margin:0 auto; max-width:540px; min-width:270px; padding:0; width:99.375%;';
    root.appendChild(bq);

    // Load Instagram embed.js
    const script = document.createElement('script');
    script.src = 'https://www.instagram.com/embed.js';
    script.async = true;
    document.body.appendChild(script);
  }
})();
</script>
</body>
</html>
